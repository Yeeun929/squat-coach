<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squat AI Coach</title>
  <!-- MediaPipe 스크립트 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
    #video-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    video { transform: rotateY(180deg); width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; transform: rotateY(180deg); width: 100%; height: 100%; object-fit: cover; }
    #info {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px;
      font-size: 1.2rem; line-height: 1.5; z-index: 10;
    }
    .status-badge { color: #00ff00; font-weight: bold; }
  </style>
</head>
<body>

  <div id="video-container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="info">
      <div>VIEW: <span id="view_status" class="status-badge">Detecting...</span></div>
      <div>REPS: <span id="rep_count" style="font-size: 2rem; color: #ffeb3b;">0</span></div>
      <div id="feedback" style="font-size: 0.9rem; color: #aaa;">카메라 앞에 서 주세요.</div>
    </div>
  </div>

<script>
  const videoElement = document.getElementById('input_video');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');
  const viewStatus = document.getElementById('view_status');
  const repCountDisplay = document.getElementById('rep_count');
  const feedbackDisplay = document.getElementById('feedback');

  let repCount = 0;
  let isDown = false;

  // 1. 각도 계산 함수
  function calcAngle(a, b, c) {
    const AB = [a.x - b.x, a.y - b.y];
    const CB = [c.x - b.x, c.y - b.y];
    const dot = AB[0] * CB[0] + AB[1] * CB[1];
    const magAB = Math.sqrt(AB[0]**2 + AB[1]**2);
    const magCB = Math.sqrt(CB[0]**2 + CB[1]**2);
    let angle = Math.acos(dot / (magAB * magCB)) * (180 / Math.PI);
    return angle;
  }

  // 2. 정면/측면 판별 함수
  function determineView(landmarks) {
    const leftShoulder = landmarks[11];
    const rightShoulder = landmarks[12];
    if (leftShoulder.visibility > 0.6 && rightShoulder.visibility > 0.6) {
      const dx = Math.abs(leftShoulder.x - rightShoulder.x);
      return dx > 0.14 ? "FRONT" : "SIDE";
    }
    return "UNKNOWN";
  }

  function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.poseLandmarks) {
      const landmarks = results.poseLandmarks;
      const view = determineView(landmarks);
      viewStatus.textContent = view;

      // 스쿼트 카운트 로직 (측면일 때 더 정확함)
      const hip = landmarks[23];  // 왼쪽 골반
      const knee = landmarks[25]; // 왼쪽 무릎
      const ankle = landmarks[27]; // 왼쪽 발목

      if (hip.visibility > 0.5 && knee.visibility > 0.5 && ankle.visibility > 0.5) {
        const angle = calcAngle(hip, knee, ankle);

        // 상태 머신 (Down -> Up)
        if (angle < 100 && !isDown) {
          isDown = true;
          feedbackDisplay.textContent = "좋아요! 이제 일어나세요!";
        } 
        if (angle > 150 && isDown) {
          isDown = false;
          repCount++;
          repCountDisplay.textContent = repCount;
          feedbackDisplay.textContent = "완벽합니다! (1회 성공)";
        }
      }
    }
    canvasCtx.restore();
  }

  const pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);

  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await pose.send({image: videoElement});
    },
    width: 640,
    height: 480
  });
  camera.start();

  // 창 크기 조절 시 캔버스 크기 맞춤
  window.addEventListener('resize', () => {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
  });
  canvasElement.width = window.innerWidth;
  canvasElement.height = window.innerHeight;
</script>
</body>
</html>
